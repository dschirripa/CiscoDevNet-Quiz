<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cisco DEVASC 200-901 Quiz</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- SCREEN: Home -->
  <div id="screen-home" class="screen active">
    <div class="card home-card">
      <div class="logo">🌐</div>
      <h1>Cisco DEVASC 200-901</h1>
      <p class="subtitle">Interactive Study Quiz</p>
      <div class="section-picker">
        <h2>Choose a Section</h2>
        <div class="section-grid" id="section-grid"></div>
        <button class="btn btn-primary btn-full" id="btn-all">All Sections (Shuffle)</button>
      </div>
      <div class="mode-row">
        <label class="mode-label">
          <input type="checkbox" id="chk-fill-blank" checked /> Include Fill-in-the-Blank
        </label>
        <label class="mode-label">
          <input type="checkbox" id="chk-mc" checked /> Include Multiple Choice
        </label>
      </div>
    </div>
  </div>

  <!-- SCREEN: Quiz -->
  <div id="screen-quiz" class="screen">
    <div class="quiz-header">
      <button class="btn btn-ghost" id="btn-quit">← Quit</button>
      <div class="progress-info">
        <span id="progress-label">Question 1 of 30</span>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      </div>
      <div class="score-badge" id="score-badge">Score: 0</div>
    </div>

    <div class="quiz-body">
      <div class="card question-card">
        <div class="question-meta">
          <span class="tag" id="q-section"></span>
          <span class="tag tag-topic" id="q-topic"></span>
        </div>
        <p class="question-text" id="q-text"></p>

        <!-- Multiple choice -->
        <div id="mc-options" class="options-list"></div>

        <!-- Fill in the blank -->
        <div id="fill-area" class="fill-area" style="display:none;">
          <input type="text" id="fill-input" class="fill-input" placeholder="Type your answer…" autocomplete="off" />
          <button class="btn btn-primary" id="btn-submit-fill">Submit</button>
        </div>

        <!-- Feedback -->
        <div id="feedback" class="feedback" style="display:none;">
          <div class="feedback-icon" id="feedback-icon"></div>
          <div class="feedback-body">
            <p class="feedback-title" id="feedback-title"></p>
            <p class="feedback-explanation" id="feedback-explanation"></p>
          </div>
        </div>

        <button class="btn btn-primary btn-full" id="btn-next" style="display:none;">Next Question →</button>
      </div>
    </div>
  </div>

  <!-- SCREEN: Results -->
  <div id="screen-results" class="screen">
    <div class="card results-card">
      <div class="result-graphic" id="result-graphic"></div>
      <h2 id="result-title"></h2>
      <p id="result-subtitle"></p>
      <div class="result-stats">
        <div class="stat"><span class="stat-val" id="stat-correct"></span><span class="stat-lbl">Correct</span></div>
        <div class="stat"><span class="stat-val" id="stat-wrong"></span><span class="stat-lbl">Wrong</span></div>
        <div class="stat"><span class="stat-val" id="stat-pct"></span><span class="stat-lbl">Score</span></div>
      </div>
      <div id="missed-section" style="display:none;">
        <h3>Missed Questions</h3>
        <div id="missed-list" class="missed-list"></div>
      </div>
      <div class="results-actions">
        <button class="btn btn-primary" id="btn-retry-missed" style="display:none;">Retry Missed Only</button>
        <button class="btn btn-secondary" id="btn-restart">New Quiz</button>
      </div>
    </div>
  </div>

  <script src="questions.js"></script>
  <script src="app.js"></script>
</body>
</html>
